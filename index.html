<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D. RAKESH // PORTFOLIO</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --panel-bg: #111827;
            --accent-neon: #00ff66;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-glow: rgba(0, 255, 102, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }

        .portfolio-container { max-width: 800px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

        /* Top Header Grid Area */
        .profile-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .avatar-zone { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent-neon); flex-shrink: 0; }
        .avatar-zone img { width: 100%; height: 100%; object-fit: cover; }

        .info-zone { flex-grow: 1; }
        .info-zone h1 { font-size: 2.2rem; font-weight: 800; color: #fff; letter-spacing: 1px; margin-bottom: 5px; }
        .info-zone .title-sub { color: var(--accent-neon); font-size: 0.95rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .info-zone .bio-text { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }

        /* Sections Structural Style */
        .section-title { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #fff; margin: 15px 0 10px; border-left: 4px solid var(--accent-neon); padding-left: 10px; }

        /* Credentials Layout Grid */
        .credentials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .cert-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .cert-card:hover { border-color: var(--accent-neon); transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 255, 102, 0.1); }
        .cert-card img { width: 100%; border-radius: 8px; display: block; }

        /* Social Interface Dock */
        .social-dock { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--panel-bg); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px; color: #fff; text-decoration: none; font-weight: 600;
            font-size: 0.95rem; border-radius: 12px; transition: all 0.3s ease;
        }
        .social-btn:hover { background: #fff; color: var(--bg-dark); transform: translateY(-2px); }
        .social-btn span { font-size: 1.2rem; }

        @media (max-width: 600px) {
            .profile-card { flex-direction: column; text-align: center; padding: 20px; }
            .social-dock { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="portfolio-container">
        
        <div class="profile-card">

                    "In the digital shadows, I architect the unhackable." Dedicated Security Researcher specializing in vulnerability assessment, defensive architecture, and threat modeling framework strategies.
                </p>

        </div>

        <div>

            <div class="credentials-grid">
                <div class="cert-card"><img src="1.png" alt="TATA Certificate"></div>
                <div class="cert-card"><img src="VTCodeX_Certificate_VTCX-PY-2026-0006.png" alt="Python Certificate"></div>
            </div>
        </div>

        <div>
            <div class="section-title">Connect With Me</div>
            <div class="social-dock">

    </div>

</body>
</html>
